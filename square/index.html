<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', system-ui, sans-serif;
    background: #0D1117;
    color: #E6EDF3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }
  .splash { max-width: 480px; padding: 24px; }
  .bird { margin-bottom: 32px; filter: drop-shadow(0 0 32px rgba(251,191,36,0.25)); }
  h1 {
    font-size: clamp(28px, 5vw, 40px);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 12px;
  }
  .sub {
    font-size: 17px;
    color: #8B949E;
    line-height: 1.5;
    margin-bottom: 36px;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 16px 36px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #FBBF24, #F59E0B);
    color: #0a0a0a;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 0 24px rgba(251,191,36,0.15);
  }
  .cta:hover { transform: translateY(-1px); box-shadow: 0 0 40px rgba(251,191,36,0.25); }
  .trust {
    margin-top: 20px;
    font-size: 13px;
    color: #6B7280;
  }
  .byline {
    margin-top: 48px;
    font-size: 13px;
    color: #30363D;
  }
  .byline a { color: #30363D; text-decoration: none; }
  .byline a:hover { color: #FBBF24; }

  @media (prefers-reduced-motion: no-preference) {
    @keyframes gentle-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    @keyframes beak-open {
      0%, 40%, 100% { transform: rotate(0deg); }
      10%, 30% { transform: rotate(-8deg); }
    }
    @keyframes beak-close {
      0%, 40%, 100% { transform: rotate(0deg); }
      10%, 30% { transform: rotate(6deg); }
    }
    @keyframes wave-pulse {
      0% { opacity: 0; transform: scale(0.7); }
      30% { opacity: 0.8; }
      100% { opacity: 0; transform: scale(1.3); }
    }
    .bird svg > g.bird-body { animation: gentle-bob 3s ease-in-out infinite; }
    .beak-upper { animation: beak-open 2.2s ease-in-out infinite; }
    .beak-lower { animation: beak-close 2.2s ease-in-out infinite; }
    .sound-wave { animation: wave-pulse 2.2s ease-out infinite; }
    .sound-wave:nth-child(2) { animation-delay: 0.15s; }
    .sound-wave:nth-child(3) { animation-delay: 0.3s; }
  }
</style>

        </g>
        <path d="M28 66 Q12 78 18 88 Q28 80 36 72 Z" fill="#F59E0B"/>

        <path class="sound-wave" d="M6 -4 Q18 -12 18 0 Q18 12 6 4" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" opacity="0"/>
        <path class="sound-wave" d="M12 -8 Q28 -18 28 0 Q28 18 12 8" fill="none" stroke="#059669" stroke-width="1.5" stroke-linecap="round" opacity="0"/>
